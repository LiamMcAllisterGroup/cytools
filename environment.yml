name: cytools
channels:
  - conda-forge
dependencies:
  # CYTools dependencies
  - python
  - numba
  - numpy
  - normaliz
  - scipy
  - cvxopt
  - python-flint
  - ppl
  - joblib
  - tqdm
  - requests
  - osqp>=1.0
  - pip
  - pip:
    - ortools==9.15.*      # bundles HiGHS 1.12; keep matched to highspy below
    - highspy==1.12.*      # must match ortools' bundled HiGHS (SONAME clash)
    - mosek
    - triangulumancer
    - pplpy
    - pypalp
    - qpsolvers
    - cygv
    - regfans
    - latticepts
    - fanroots
    # The actual cytools package (taken from pypi)
    - cytools
  # Common useful tools
  - jupyterlab
  - matplotlib
  - plotly
  - ipywidgets
  - anywidget
  # Uncomment the following lines for additional tools
  # - sage